<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Whispers</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link href="https://fonts.googleapis.com/css2?family=Chokokutai&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Roboto+Slab:wght@100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    </head>
    <body>

        <div class="game-window">
            
            <div class="game-window__top-menu">
                 <img class="game-window__top-menu-logo" id="fade-logo" src="./img/whispers.png" alt="Whispers" />
                 <ul class="game-window__top-menu-list">
                    <li class="game-window__top-menu-item">Plecak</li>
                 </ul>
            </div>

            <div class="game-window__city">
                <img src="./img/city.png" alt="Whispers" />
            </div>

            <div class="game-window__fog">
                <img class="game-window__fog-img" id="fog" src="./img/fog.png" alt="Whispers" />
            </div>

        </div>

        <script type="text/javascript" src="js/scripts.js"></script>

    </body>
</html>
