<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Whispers</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link href="https://fonts.googleapis.com/css2?family=Chokokutai&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Roboto+Slab:wght@100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    </head>
    <body>

        <div class="game-window">
            
            <div class="game-window__top-menu">
                 <img class="game-window__top-menu-logo" id="fade-logo" src="./img/whispers.png" alt="Whispers" />
                 <ul class="game-window__top-menu-list">
                    <li class="game-window__top-menu-item" id="character">Bohater</li>
                    <li class="game-window__top-menu-item" id="backpack">Plecak</li>
                    <li class="game-window__top-menu-item" id="notes">Notatki</li>
                 </ul>
            </div>

            <div class="game-window__city">
                <img src="./img/city.png" alt="Whispers" />
            </div>

            <div class="game-window__fog">
                <img class="game-window__fog-img" id="fog" src="./img/fog.png" alt="Whispers" />
            </div>

        </div>

        <div class="ui-window">

            <div class="ui-window__backpack" id="backpack_window">
                <div class="ui-window__top_bar" id="top_bar">
                    <div class="ui-window__exit" id="exit_button"></div>
                    <div class="ui-window__title" id="backpack_title"></div>
                </div>
                <div class="ui-window__main" id="backpack_main">
                </div>
            </div>

            <div class="ui-window__hero ui-window__backpack" id="hero_window">
                <div class="hero__top_bar" id="top_bar">
                    <div class="ui-window__exit" id="hero_exit__button"></div>
                    <div class="ui-window__title" id="backpack_title"></div>
                </div>
                <div class="ui-window__hero_main" id="hero_main">
                    <div class="hero-avatar">
                        <img class="hero-avatar__avatar-frame" id="avatar-frame" src="./img/avatar-frame.png" />
                        <div class="hero-avatar__exp-frame" id="exp-frame"></div>
                        <div class="hero-avatar__hero-image" id="hero-image"><img src="./img/avatar.png" alt="Zoriondenel" /></div>
                        <div class="hero-avatar__hero-name" id="hero-name">zoriondenel</div>
                    </div>
                    <div class="window-separate"></div>
                    <div class="hero-stats">
                        <table class="hero-stats__list">
                            <tr>
                                <td>Życie</td>
                                <td class="hero-stats__list-line"></td>
                                <td>5</td>
                            </tr>
                            <tr>
                                <td>Atak</td>
                                <td class="hero-stats__list-line"></td>
                                <td>5</td>
                            </tr>
                            <tr>
                                <td>Magia</td>
                                <td class="hero-stats__list-line"></td>
                                <td>5</td>
                            </tr>
                        </table>

                        <div class="hero-stats__history">
                            Zoriondenel to elfica wojowniczka, która jest mistrzynią w walce sztyletami. Potrafi ukrywać się w mroku i z tamtąd przeprowadzać mordercze ataki.
                        </div>

                        <div class="hero-stats__special">
                            <div class="special" data-title="Dagger" data-desc="Daje +10pkt ataku"><img src="./img/dagger.png"></div>
                            <div class="special__tooltip" id="tooltip"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="ui-window__note"></div>

        </div>

        <script type="text/javascript" src="js/scripts.js"></script>

    </body>
</html>
